<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="{{FONT_URL}}" rel="stylesheet">
<style>
/* ============================================
   RESET & CSS VARIABLES
   ============================================ */
* { margin: 0; padding: 0; box-sizing: border-box; }

{{THEME_VARS}}

body {
  font-family: {{FONT_FAMILY}};
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ============================================
   DECK & SLIDE ENGINE
   ============================================ */
#deck {
  width: 1280px;
  height: 720px;
  position: relative;
  transform-origin: top left;
  overflow: hidden;
}

.slide {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding: 72px 128px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}

.slide.active { opacity: 1; pointer-events: auto; }

/* ============================================
   CHROME: progress bar, page number, keys hint
   ============================================ */
.progress {
  position: fixed; top: 0; left: 0; height: 2px;
  background: var(--accent);
  transition: width 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 100;
}
.page-num {
  position: fixed; bottom: 32px; right: 40px;
  font-size: 13px; color: var(--text-3);
  font-variant-numeric: tabular-nums;
}
.keys {
  position: fixed; bottom: 32px; left: 40px;
  font-size: 12px; color: var(--text-3); opacity: 0.5;
}

/* ============================================
   NOTES PANEL (toggle with N key)
   ============================================ */
#notes-panel {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 200;
  background: rgba(20,20,20,0.95); backdrop-filter: blur(12px);
  border-top: 1px solid rgba(212,160,74,0.3);
  padding: 16px 48px; max-height: 180px; overflow-y: auto;
  font-size: 15px; line-height: 1.7; color: rgba(255,255,255,0.8);
  transform: translateY(100%); transition: transform 0.3s ease;
}
#notes-panel.visible { transform: translateY(0); }
#notes-panel .notes-label {
  font-size: 11px; font-weight: 600; letter-spacing: 1.5px;
  text-transform: uppercase; color: var(--accent); margin-bottom: 6px;
}

/* ============================================
   TIMER
   ============================================ */
#timer {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
  font-size: 15px; color: var(--accent); font-weight: 500;
  font-variant-numeric: tabular-nums; letter-spacing: 1px;
  z-index: 100; opacity: 0; transition: opacity 0.3s;
}

/* ============================================
   TYPOGRAPHY
   ============================================ */
h1 { font-size: 72px; font-weight: 700; line-height: 1.1; letter-spacing: -2px; margin-bottom: 16px; }
h2 { font-size: 52px; font-weight: 600; line-height: 1.15; letter-spacing: -1.5px; margin-bottom: 16px; }
h3 { font-size: 24px; font-weight: 500; line-height: 1.3; margin-bottom: 20px; color: var(--text); }
p  { font-size: 20px; line-height: 1.6; color: var(--text-2); max-width: 60ch; }

/* ============================================
   UTILITY CLASSES
   ============================================ */

/* Labels & tags */
.label { font-size: 12px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin-bottom: 20px; }

/* Slide type modifiers */
.cover { align-items: flex-start; justify-content: flex-end; padding-bottom: 86px; }
.cover h1 { font-size: 96px; font-weight: 800; letter-spacing: -3px; margin-bottom: 12px; }
.cover p { font-size: 24px; color: var(--text-2); font-weight: 300; }

.section-intro { align-items: flex-start; }
.section-intro h2 { max-width: 18ch; }

.end-slide { align-items: flex-start; justify-content: flex-end; padding-bottom: 100px; }
.end-slide h2 { font-size: 44px; font-weight: 300; letter-spacing: -1px; max-width: 20ch; line-height: 1.3; }
.end-slide h2 strong { font-weight: 700; }

/* Lists */
ul { list-style: none; margin: 12px 0; }
ul li { font-size: 21px; line-height: 1.5; padding: 10px 0; color: var(--text-2); border-bottom: 1px solid var(--border); }
ul li:last-child { border-bottom: none; }
ul li strong { color: var(--text); font-weight: 500; }

/* Code blocks */
.mono { font-family: var(--mono); font-size: 15px; line-height: 1.8; color: var(--text-2); background: var(--surface); padding: 24px 28px; border-radius: 8px; margin: 16px 0; white-space: pre; overflow-x: auto; }

/* Grid layouts */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 20px; }
.three-col { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; margin-top: 20px; }
.four-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 16px; }
.four-grid .block { padding: 16px; background: var(--surface); border-radius: 8px; }
.four-grid .block h4 { font-size: 15px; margin-bottom: 6px; }
.four-grid .block p { font-size: 14px; line-height: 1.5; }

/* Content blocks */
.block { padding: 20px 0; }
.block h4 { font-size: 18px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
.block p { font-size: 18px; line-height: 1.5; color: var(--text-2); }
.bordered { border-top: 1px solid var(--border); padding-top: 20px; }

/* Tables */
table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 19px; }
th { text-align: left; font-size: 12px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-3); padding: 10px 0; border-bottom: 1px solid var(--border); }
td { padding: 12px 0; padding-right: 20px; border-bottom: 1px solid var(--border); color: var(--text-2); vertical-align: top; }
td:first-child { color: var(--text); font-weight: 500; }

/* Accent helpers */
.accent { color: var(--accent); }
.dim { color: var(--text-3); font-size: 14px; }

/* Big numbers */
.big-number { font-size: 140px; font-weight: 800; color: var(--accent); letter-spacing: -4px; line-height: 1; margin: 20px 0; }
.big-number-label { font-size: 22px; color: var(--text-2); font-weight: 300; margin-top: 12px; }

/* Callout box */
.callout { font-size: 22px; line-height: 1.5; color: var(--text); padding: 20px 24px; background: var(--accent-dim); border-radius: 8px; margin: 20px 0; max-width: 55ch; }

/* Source citation */
.source { font-size: 14px; color: var(--text-3); margin-top: 16px; font-style: italic; }

/* Comparison layout */
.compare { display: grid; grid-template-columns: 1fr auto 1fr; gap: 28px; align-items: center; margin: 20px 0; }
.compare-side { padding: 20px; border-radius: 8px; }
.compare-side.old { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); }
.compare-side.new { background: var(--accent-dim); border: 1px solid rgba(212,160,74,0.2); }
.compare-arrow { font-size: 20px; color: var(--text-3); }
.compare-side .title { font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; color: var(--text-3); }
.compare-side p { font-size: 18px; color: var(--text-2); }

/* Layer stack */
.layer-stack { margin: 16px 0; }
.layer-item { display: flex; align-items: baseline; padding: 14px 0; border-bottom: 1px solid var(--border); font-size: 19px; }
.layer-item:last-child { border-bottom: none; }
.layer-tag { font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; width: 72px; flex-shrink: 0; color: var(--accent); }
.layer-content { color: var(--text-2); }

/* Diagram */
.diagram { font-family: var(--mono); font-size: 14px; line-height: 2; color: var(--text-2); margin: 16px 0; white-space: pre; }
.diagram .hl { color: var(--text); font-weight: 500; }

/* Stats row */
.stat-row { display: flex; gap: 48px; margin: 20px 0; }
.stat-num { font-size: 48px; font-weight: 700; color: var(--accent); letter-spacing: -2px; }
.stat-label { font-size: 14px; color: var(--text-3); margin-top: 4px; }

/* Quote block */
.quote-block { padding: 20px 0; border-left: 2px solid var(--accent); padding-left: 20px; margin: 16px 0; }
.quote-block p { font-size: 18px; font-style: italic; color: var(--text-2); }
.quote-block .attr { font-size: 14px; color: var(--text-3); font-style: normal; margin-top: 8px; }

/* Scenario badge */
.scenario { display: inline-block; font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--bg); background: var(--accent); padding: 3px 10px; border-radius: 4px; margin-bottom: 16px; }

/* Flow visual */
.flow-visual { display: flex; align-items: center; gap: 16px; margin: 24px 0; flex-wrap: wrap; }
.flow-step { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; font-size: 16px; color: var(--text-2); }
.flow-step.active-step { border-color: var(--accent); background: var(--accent-dim); color: var(--text); }
.flow-arrow { color: var(--text-3); font-size: 18px; }
</style>
</head>
<body tabindex="-1">

<div id="deck">

<!-- ==========================================
     SLIDES GO HERE
     Each slide is a <div class="slide" data-slide-type="..." data-rhythm="...">
     First slide needs class="slide cover active"
     ========================================== -->

{{SLIDES}}

</div><!-- /deck -->

<script type="application/json" id="deck-lock">
{{DECK_LOCK}}
</script>

<!-- Chrome -->
<div class="progress" id="progress"></div>
<div class="page-num" id="pageNum"></div>
<div class="keys">← → Navigate / F Fullscreen / T Timer / N Notes</div>
<div id="notes-panel"><div class="notes-label">Speaker Notes</div><div id="notes-content"></div></div>
<div id="timer">00:00</div>

<script>
/* ============================================
   SLIDE ENGINE
   - Automatic viewport scaling (1280x720 base)
   - Keyboard, touch, click navigation
   - Hash-based URL routing (#1, #2, ...)
   - Speaker notes panel (N key)
   - Presentation timer (T key, auto on fullscreen)
   ============================================ */
const deck = document.getElementById('deck');
const slides = document.querySelectorAll('.slide');
const progress = document.getElementById('progress');
const pageNum = document.getElementById('pageNum');
let cur = 0;

// --- Viewport scaling ---
function scaleDeck() {
  const sw = window.innerWidth / 1280;
  const sh = window.innerHeight / 720;
  const s = Math.min(sw, sh);
  deck.style.transform = 'scale(' + s + ')';
  deck.style.marginLeft = ((window.innerWidth - 1280 * s) / 2) + 'px';
  deck.style.marginTop = ((window.innerHeight - 720 * s) / 2) + 'px';
}
scaleDeck();
window.addEventListener('resize', scaleDeck);

// --- Notes (must be before go() which calls updateNotes) ---
var notesPanel = document.getElementById('notes-panel');
var notesContent = document.getElementById('notes-content');
var notesVisible = false;

var NOTES = [
  {{NOTES}}
];

function updateNotes() {
  notesContent.textContent = NOTES[cur] || '';
}
function toggleNotes() {
  notesVisible = !notesVisible;
  notesPanel.classList.toggle('visible', notesVisible);
}

// --- Timer ---
var timerEl = document.getElementById('timer');
var timerStart = 0, timerInterval = null, timerVisible = false;
function startTimer() {
  if (timerInterval) return;
  timerStart = Date.now();
  timerInterval = setInterval(function() {
    var s = Math.floor((Date.now() - timerStart) / 1000);
    var m = Math.floor(s / 60);
    timerEl.textContent = String(m).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0');
  }, 1000);
}
function showTimer() { timerVisible = true; timerEl.style.opacity = '1'; }
function hideTimer() { timerVisible = false; timerEl.style.opacity = '0'; }
function toggleTimer() {
  timerVisible ? hideTimer() : showTimer();
  if (timerVisible && !timerInterval) startTimer();
}
document.addEventListener('fullscreenchange', function() {
  if (document.fullscreenElement) { showTimer(); startTimer(); } else { hideTimer(); }
});

// --- Navigation ---
function go(n, pushHash) {
  if (pushHash === undefined) pushHash = true;
  if (n < 0 || n >= slides.length) return;
  slides[cur].classList.remove('active');
  cur = n;
  slides[cur].classList.add('active');
  progress.style.width = (cur / (slides.length - 1) * 100) + '%';
  pageNum.textContent = (cur + 1) + ' / ' + slides.length;
  if (pushHash) history.replaceState(null, '', '#' + (cur + 1));
  updateNotes();
}

// Auto-start timer on first navigation
var _origGo = go;
go = function(n, pushHash) {
  if (cur === 0 && n > 0 && !timerInterval) startTimer();
  _origGo(n, pushHash);
};

function goFromHash() {
  var m = location.hash.match(/^#(\d+)$/);
  if (m) go(Math.min(Math.max(parseInt(m[1], 10) - 1, 0), slides.length - 1), false);
}
window.addEventListener('hashchange', goFromHash);
goFromHash();
go(0);

// --- Keyboard ---
document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') { e.preventDefault(); go(cur + 1); }
  else if (e.key === 'ArrowLeft' || e.key === 'PageUp') { e.preventDefault(); go(cur - 1); }
  else if (e.key === 'Home') go(0);
  else if (e.key === 'End') go(slides.length - 1);
  else if (e.key === 'f' || e.key === 'F') {
    document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen();
  }
  else if (e.key === 'n' || e.key === 'N') { toggleNotes(); }
  else if (e.key === 't' || e.key === 'T') { toggleTimer(); }
});

// --- Touch ---
var tx = 0;
document.addEventListener('touchstart', function(e) { tx = e.touches[0].clientX; });
document.addEventListener('touchend', function(e) {
  var d = e.changedTouches[0].clientX - tx;
  if (Math.abs(d) > 50) d < 0 ? go(cur + 1) : go(cur - 1);
});

// --- Click ---
document.addEventListener('click', function(e) {
  if (e.target.closest('a')) return;
  e.clientX > window.innerWidth / 2 ? go(cur + 1) : go(cur - 1);
});
</script>

</body>
</html>
