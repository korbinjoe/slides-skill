name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify theme registry
        run: python3 scripts/verify_themes.py

      - name: Verify theme demo bundle
        run: python3 scripts/build_theme_demos.py --check

      - name: Validate reference deck
        run: python3 scripts/validate_deck.py examples/multi-agent-orchestration.html --strict

      - name: Run tests
        run: python3 -m pytest tests/ -q
